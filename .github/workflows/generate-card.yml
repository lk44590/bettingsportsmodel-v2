name: Generate Daily Betting Card

on:
  schedule:
    # Run daily at 10:00 AM Eastern (UTC-4/UTC-5)
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-card:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn requests joblib
        
    - name: Generate daily card
      working-directory: ./
      run: |
        python generate_daily_card.py --skip-provider-sync
