name: Generate Daily Betting Card

on:
  schedule:
    # Run daily at 10:00 AM Eastern (UTC-4/UTC-5)
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn requests joblib
        
    - name: Generate daily card
      working-directory: ./
      run: |
        python generate_daily_card.py --skip-provider-sync
        
    - name: Commit and push output files
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add output/daily-card-*.html output/phone-card-*.html output/daily-card-*.json output/daily-candidates-*.json output/model-performance-*.json tracking/model_results.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "Update daily card - $(date +%Y-%m-%d)"
        git push
